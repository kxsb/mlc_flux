<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLC Flux</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="sidebar" class="sidebar">
    <h2>MLC Flux</h2>

    <button id="themeToggleBtn" class="secondary-btn theme-toggle-btn" type="button">
      🌙 Mode sombre
    </button>

    <div class="filters">
      <h3>Vues</h3>
      <label><input type="radio" name="dataView" value="stats" checked> Statistiques globales</label>
      <label><input type="radio" name="dataView" value="pros"> Activité des professionnels</label>
      <label><input type="radio" name="dataView" value="cartography"> Cartographie</label>
      <label><input type="radio" name="dataView" value="territories"> Territoires</label>
      <label><input type="radio" name="dataView" value="sectors"> Secteurs</label>
      <label><input type="radio" name="dataView" value="network"> Network global</label>
    </div>

    <div class="filters period-filter-block">
      <h3>Période d’analyse</h3>

      <button
        id="periodActiveSummary"
        class="period-active-summary"
        type="button"
        aria-controls="customPeriodFields"
        aria-expanded="false"
        title="Définir une période personnalisée"
      >
        <span class="period-active-label">Période active</span>
        <span id="periodFilterHint" class="period-active-value">Chargement…</span>
      </button>

      <div class="sidebar-field-label">Période rapide</div>
      <select id="periodPreset" class="sidebar-select">
        <option value="all">Toute la période disponible</option>
        <option value="last30">30 derniers jours</option>
        <option value="last90">90 derniers jours</option>
        <option value="currentYear">Année en cours</option>
        <option value="custom">Personnalisée</option>
      </select>

      <div id="customPeriodFields" class="period-date-grid hidden">
        <div>
          <input
            id="periodStart"
            class="sidebar-date-input"
            type="date"
            aria-label="Date de début"
          />
        </div>

        <div>
          <input
            id="periodEnd"
            class="sidebar-date-input"
            type="date"
            aria-label="Date de fin"
          />
        </div>
      </div>

      <div class="period-filter-actions">
        <button id="applyPeriodButton" class="primary-btn" type="button">
          Appliquer
        </button>
        <button id="resetPeriodButton" class="secondary-btn" type="button">
          Réinitialiser
        </button>
      </div>

    </div>
  </div>

  <div id="mainContent" class="main-content">
    <div id="pageTitle"></div>
    <div id="content"></div>
  </div>

  <script src="https://unpkg.com/cytoscape@3.27.0/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@9.3.0/dist.min.js"></script>
  <script src="/static/js/chart.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
